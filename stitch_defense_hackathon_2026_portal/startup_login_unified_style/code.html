<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#191c1c",
                    "on-tertiary-fixed-variant": "#3b4b2f",
                    "on-error-container": "#93000a",
                    "on-surface-variant": "#404850",
                    "surface": "#f8faf9",
                    "tertiary-container": "#687a5a",
                    "on-secondary-container": "#596748",
                    "surface-container": "#eceeed",
                    "error-container": "#ffdad6",
                    "outline-variant": "#c0c7d1",
                    "primary-fixed": "#cce5ff",
                    "secondary": "#546344",
                    "error": "#ba1a1a",
                    "surface-container-high": "#e6e9e8",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#004b73",
                    "on-primary-fixed": "#001d31",
                    "surface-tint": "#006397",
                    "primary": "#006193",
                    "on-secondary": "#ffffff",
                    "surface-variant": "#e1e3e2",
                    "secondary-container": "#d5e6be",
                    "on-secondary-fixed-variant": "#3d4b2e",
                    "inverse-surface": "#2e3131",
                    "outline": "#707881",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#131f07",
                    "on-primary-container": "#fdfcff",
                    "tertiary": "#506143",
                    "primary-fixed-dim": "#92ccff",
                    "secondary-fixed-dim": "#bccca6",
                    "surface-bright": "#f8faf9",
                    "on-tertiary-fixed": "#111f08",
                    "surface-container-highest": "#e1e3e2",
                    "surface-container-low": "#f2f4f3",
                    "primary-container": "#1b7ab5",
                    "on-background": "#191c1c",
                    "on-tertiary-container": "#f9ffed",
                    "inverse-on-surface": "#eff1f0",
                    "secondary-fixed": "#d8e8c1",
                    "on-error": "#ffffff",
                    "inverse-primary": "#92ccff",
                    "background": "#f8faf9",
                    "tertiary-fixed-dim": "#b9cda8",
                    "tertiary-fixed": "#d5e9c3",
                    "surface-dim": "#d8dad9",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Public Sans"],
                    "display": ["Public Sans"],
                    "body": ["Public Sans"],
                    "label": ["Public Sans"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Public Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-hidden bg-[#161A4E]">
<!-- Header -->
<header class="flex justify-between items-center w-full px-12 py-8 max-w-[1440px] mx-auto z-20">
<div class="text-2xl font-bold text-white tracking-tight" style="">
            Sovereign Portal
        </div>
<div class="flex gap-8">
<button class="text-white/90 hover:text-white transition-all flex items-center gap-2" style="">
<span class="material-symbols-outlined text-[20px]" style="">language</span>
<span class="text-[12px] uppercase tracking-widest font-bold" style="">EN</span>
</button>
<button class="text-white/90 hover:text-white transition-all flex items-center gap-2" style="">
<span class="material-symbols-outlined text-[20px]" style="">help</span>
<span class="text-[12px] uppercase tracking-widest font-bold" style="">Support</span>
</button>
</div>
</header>
<!-- Main Content: Perfectly Centered Card -->
<main class="flex-grow flex items-center justify-center p-6 z-10">
<div class="w-[480px] min-h-[600px] bg-white rounded-xl p-14 shadow-2xl flex flex-col justify-center relative overflow-hidden">
<!-- Subtle Card Motif -->
<div class="absolute top-0 right-0 w-24 h-24 bg-slate-50 opacity-60 translate-x-12 -translate-y-12 rotate-45 pointer-events-none"></div>
<div class="flex flex-col items-center mb-10">
<div class="mb-6 bg-[#0A2472] p-4 rounded-lg shadow-md">
<span class="material-symbols-outlined text-white text-[32px]" style='font-variation-settings: "FILL" 1;'>security</span>
</div>
<h1 class="text-[1.75rem] font-extrabold text-on-surface tracking-tight text-center leading-tight" style="">Startup Login</h1>
<p class="text-[12px] text-outline mt-3 font-bold uppercase tracking-[0.15em]" style=""><br/></p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div>
<label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-0.5" style="">
                        Email Address
                    </label>
<div class="relative">
<input class="w-full bg-[#E8EDF2] border-0 border-b-2 border-outline-variant px-4 py-4 text-on-surface placeholder:text-outline/70 focus:ring-0 focus:border-[#0A2472] transition-all duration-300 rounded-t-sm" placeholder="name@agency.gov" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-2 ml-0.5">
<label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant" style="">
                            Password
                        </label>
<a class="text-[11px] font-bold uppercase tracking-wider text-[#0A2472] hover:underline" href="#" style="">
                            Forgot Password?
                        </a>
</div>
<div class="relative">
<input class="w-full bg-[#E8EDF2] border-0 border-b-2 border-outline-variant px-4 py-4 text-on-surface placeholder:text-outline/70 focus:ring-0 focus:border-[#0A2472] transition-all duration-300 rounded-t-sm pr-12" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline/60 hover:text-on-surface transition-colors" style="" type="button">
<span class="material-symbols-outlined text-[20px]" style="">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-[#0A2472] text-white font-bold py-4 rounded-md hover:bg-[#071952] active:scale-[0.98] transition-all duration-200 shadow-xl shadow-[#0A2472]/20 flex items-center justify-center gap-3 mt-6" style="" type="submit">
<span class="text-[15px] uppercase tracking-wider" style="">Login</span>
<span class="material-symbols-outlined text-[20px]" style="">login</span>
</button>
</form>
<!-- Bottom Link -->
<div class="mt-12 text-center">
<p class="text-on-surface-variant text-[13px] font-medium" style="">
                    New here? 
                    <a class="text-[#0A2472] font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#" style="">
                        Create an account
                    </a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="flex flex-col md:flex-row justify-between items-center w-full px-12 py-10 mt-auto z-20">
<div class="text-[10px] uppercase tracking-[0.1em] text-white/50 font-bold" style="">
            © 2024 Sovereign Defense Operations. Secure Intelligence Access.
        </div>
<div class="flex gap-10 mt-6 md:mt-0">
<a class="text-[10px] uppercase tracking-[0.1em] text-white/50 hover:text-white font-bold transition-colors duration-300" href="#" style="">Privacy Policy</a>
<a class="text-[10px] uppercase tracking-[0.1em] text-white/50 hover:text-white font-bold transition-colors duration-300" href="#" style="">Terms of Service</a>
<a class="text-[10px] uppercase tracking-[0.1em] text-white/50 hover:text-white font-bold transition-colors duration-300" href="#" style="">Support</a>
</div>
</footer>
</body></html>
