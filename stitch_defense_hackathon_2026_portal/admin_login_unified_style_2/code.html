</div>
<!-- Password Field -->
<div class="relative">
<div class="flex justify-between items-center mb-2">

<div class="relative flex items-center">

<button class="absolute right-3 text-outline hover:text-primary transition-colors" style="" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" style="">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->

<button class="w-full bg-[#005a8d] hover:bg-[#004b73] text-white font-bold py-4 px-6 rounded transition-all transform active:scale-[0.98] shadow-lg flex items-center justify-center gap-3" style="" type="submit">

</form>

<div class="mt-auto pt-6 border-t border-surface-container text-center">
<p class="text-[12px] text-outline flex items-center justify-center gap-2" style="">
<span class="material-symbols-outlined text-[16px]" data-icon="info" style="">info</span>
                    Contact your administrator for access
                </p>
